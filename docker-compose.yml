services:
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: .
      target: app
    image: tpss-app:staging
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment: &app_env
      APP_NAME: ${APP_NAME:-TPSS}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_LOCALE: ${APP_LOCALE:-th}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-th}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_STACK: ${LOG_STACK:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-tpss}
      DB_USERNAME: ${DB_USERNAME:-tpss}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CONFLICT_ASYNC_READS: ${CONFLICT_ASYNC_READS:-true}
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-*}"
      RUN_MIGRATIONS: "true"
      DB_SEED: ${DB_SEED:-false}
      CONTAINER_ROLE: web
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: tpss-app:staging
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      <<: *app_env
      RUN_MIGRATIONS: "false"
      DB_SEED: "false"
      CONTAINER_ROLE: worker

  scheduler:
    image: tpss-app:staging
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      <<: *app_env
      RUN_MIGRATIONS: "false"
      DB_SEED: "false"
      CONTAINER_ROLE: scheduler

  db:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tpss}
      MYSQL_USER: ${DB_USERNAME:-tpss}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - tpss-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  tpss-db:
