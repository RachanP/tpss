<!doctype html><html><head><meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
.r { background: var(--brand-navy); height: 60px; }
.cell { display: flex; flex-direction: column; gap: 4px; }
.lb { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
.nm { font-size: 11px; font-weight: 700; color: var(--fg-1); }
.use { font-size: 10px; color: var(--fg-3); }
</style></head>
<body><div class="card">
  <div style="font-size:13px;font-weight:700;margin-bottom:14px">Border radius</div>
  <div class="grid">
    <div class="cell"><div class="r" style="border-radius:4px"></div><div class="nm">--r-xs</div><div class="use">chips</div><div class="lb">4</div></div>
    <div class="cell"><div class="r" style="border-radius:6px"></div><div class="nm">--r-sm</div><div class="use">nav, micro</div><div class="lb">6</div></div>
    <div class="cell"><div class="r" style="border-radius:8px"></div><div class="nm">--r-md</div><div class="use">buttons, inputs</div><div class="lb">8</div></div>
    <div class="cell"><div class="r" style="border-radius:10px"></div><div class="nm">--r-lg</div><div class="use">cards</div><div class="lb">10</div></div>
    <div class="cell"><div class="r" style="border-radius:12px"></div><div class="nm">--r-xl</div><div class="use">panels</div><div class="lb">12</div></div>
    <div class="cell"><div class="r" style="border-radius:16px"></div><div class="nm">--r-2xl</div><div class="use">sheets</div><div class="lb">16</div></div>
    <div class="cell"><div class="r" style="border-radius:999px"></div><div class="nm">--r-pill</div><div class="use">badges</div><div class="lb">∞</div></div>
  </div>
</div></body></html>
